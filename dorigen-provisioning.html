<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Origen Provisioning · Maó, Menorca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#FFF9F3;font-family:'Cormorant Garamond',Georgia,serif;color:#333A32;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#C9A96E;border-radius:2px;}

/* LANGUAGE SELECTOR */
.lang-screen{position:fixed;inset:0;background:#1C2820;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;transition:opacity .5s ease;}
.lang-screen.hidden{opacity:0;pointer-events:none;}
.lang-logo{width:min(300px,70vw);}
.lang-subtitle{font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.28em;color:#C9A96E;text-transform:uppercase;}
.lang-buttons{display:flex;gap:16px;}
.lang-btn{background:none;border:1px solid rgba(201,169,110,.4);color:#F2D3B1;font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:14px 32px;cursor:pointer;transition:all .2s;}
.lang-btn:hover{background:#C9A96E;color:#1C2820;border-color:#C9A96E;}
.lang-flag{font-size:22px;display:block;margin-bottom:6px;}

/* LANG SWITCHER in nav */
.lang-switch{display:flex;gap:0;margin-left:auto;border:1px solid rgba(51,58,50,.15);height:100%;}
.lsw-btn{background:none;border:none;padding:0 12px;font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8A9088;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;}
.lsw-btn.on{color:#333A32;background:rgba(201,169,110,.1);}
.lsw-btn:hover{color:#C9A96E;}

/* MAIN */
.hero{background:#1C2820;color:#F2D3B1;min-height:68vh;display:flex;flex-direction:column;justify-content:flex-end;padding:48px;position:relative;overflow:hidden;}
.lbl{font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.28em;color:#C9A96E;text-transform:uppercase;}
.nav-bar{background:#fff;border-bottom:1px solid rgba(51,58,50,.1);padding:0 40px;display:flex;overflow-x:auto;position:sticky;top:0;z-index:90;-webkit-overflow-scrolling:touch;align-items:stretch;}
.nbtn{background:none;border:none;border-bottom:2px solid transparent;padding:14px 14px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8A9088;white-space:nowrap;cursor:pointer;font-family:'Raleway',sans-serif;transition:all .2s;}
.nbtn:hover{color:#C9A96E;}
.nbtn.on{color:#333A32;border-bottom-color:#C9A96E;}
.srch{padding:18px 40px 4px;background:#FFF9F3;}
.srch input{width:100%;max-width:380px;padding:10px 16px;border:1px solid rgba(51,58,50,.18);background:#fff;font-size:15px;color:#333A32;font-family:'Cormorant Garamond',Georgia,serif;outline:none;transition:border-color .2s;}
.srch input:focus{border-color:#C9A96E;}
.main{padding:14px 40px 110px;max-width:960px;margin:0 auto;}
.card{background:#fff;padding:30px 34px;margin-bottom:10px;border-left:3px solid transparent;transition:border-color .2s,box-shadow .2s;}
.card:hover{border-left-color:#C9A96E;box-shadow:0 2px 20px rgba(28,40,32,.07);}
.snum{font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.2em;color:#C9A96E;font-weight:700;margin-bottom:4px;}
.stitle{font-size:20px;font-weight:300;letter-spacing:.06em;color:#1C2820;padding-bottom:10px;border-bottom:1px solid #C9A96E;margin-bottom:18px;}
.irow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(51,58,50,.07);}
.irow:last-child{border-bottom:none;}
.iname{flex:1;font-size:14.5px;line-height:1.4;}
.iprice{font-family:'Raleway',sans-serif;font-size:12.5px;font-weight:500;color:#3C0F12;white-space:nowrap;}
.qctrl{display:flex;align-items:center;border:1px solid rgba(51,58,50,.22);height:28px;flex-shrink:0;}
.qbtn{background:none;border:none;width:26px;height:26px;font-size:16px;color:#333A32;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;font-family:'Raleway',sans-serif;}
.qbtn:hover{background:#F2D3B1;}
.qval{font-family:'Raleway',sans-serif;font-size:12px;min-width:22px;text-align:center;}
.abtn{background:none;border:1px solid rgba(51,58,50,.22);padding:3px 11px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#333A32;cursor:pointer;transition:all .15s;height:28px;white-space:nowrap;font-family:'Raleway',sans-serif;}
.abtn:hover{background:#333A32;color:#fff;border-color:#333A32;}
.fab{position:fixed;bottom:24px;right:24px;z-index:200;background:#3C0F12;color:#fff;border:none;border-radius:50px;padding:13px 22px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(60,15,18,.35);cursor:pointer;font-family:'Raleway',sans-serif;transition:transform .2s;}
.fab:hover{transform:scale(1.04);}
.badge{background:#C9A96E;color:#1C2820;border-radius:50%;width:22px;height:22px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Raleway',sans-serif;}
.ovl{position:fixed;inset:0;background:rgba(28,40,32,.35);z-index:250;opacity:0;pointer-events:none;transition:opacity .3s;}
.ovl.on{opacity:1;pointer-events:auto;}
.drw{position:fixed;top:0;right:0;bottom:0;width:min(400px,100vw);background:#fff;z-index:300;box-shadow:-4px 0 40px rgba(28,40,32,.15);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;}
.drw.open{transform:translateX(0);}
.drw-head{background:#1C2820;color:#F2D3B1;padding:22px 26px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.drw-body{flex:1;overflow-y:auto;padding:18px 26px;}
.drw-foot{padding:18px 26px;border-top:1px solid rgba(51,58,50,.1);flex-shrink:0;}
.ci{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid rgba(51,58,50,.08);}
.ci:last-child{border-bottom:none;}
.ci-name{flex:1;font-size:14px;line-height:1.4;}
.ci-price{font-family:'Raleway',sans-serif;font-size:12px;color:#3C0F12;font-weight:500;white-space:nowrap;margin-top:2px;}
.chk{padding:28px 40px 80px;max-width:580px;margin:0 auto;display:none;}
.chk.on{display:block;}
.catalog-wrap{display:block;}
.catalog-wrap.off{display:none;}
.flbl{font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A9088;display:block;margin-bottom:5px;margin-top:18px;}
.finput{width:100%;padding:10px 14px;border:1px solid rgba(51,58,50,.2);background:#fff;font-size:15px;color:#333A32;font-family:'Cormorant Garamond',Georgia,serif;outline:none;transition:border-color .2s;}
.finput:focus{border-color:#C9A96E;}
.wabtn{background:#25D366;color:#fff;border:none;width:100%;padding:15px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-family:'Raleway',sans-serif;transition:filter .2s;}
.wabtn:hover{filter:brightness(1.08);}
.summary{background:#FFF9F3;border:1px solid rgba(51,58,50,.1);padding:16px 20px;margin-top:10px;}
.sum-row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;border-bottom:1px solid rgba(51,58,50,.06);}
.sum-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:2px solid #C9A96E;}
.footer{background:#1C2820;color:#F2D3B1;padding:44px 40px;display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;}
@media(max-width:560px){
  .hero,.footer,.chk{padding-left:22px;padding-right:22px;}
  .nav-bar,.main,.srch{padding-left:18px;padding-right:18px;}
  .card{padding:22px 18px;}
  .footer{grid-template-columns:1fr;}
  .lang-buttons{flex-direction:column;align-items:center;}
}
</style>
</head>

  document.getElementById("langScreen").classList.add("hidden");
  document.getElementById("lswEn").classList.toggle("on", l==="en");
  document.getElementById("lswEs").classList.toggle("on", l==="es");
  applyTexts();
  buildNav();
  renderSections();
}

function applyTexts() {
  const t = T[lang];
  document.getElementById("heroDesc").textContent = t.heroDesc;
  document.getElementById("heroTagline").textContent = t.tagline;
  document.getElementById("footerTagline").textContent = t.tagline;
  document.getElementById("searchInput").placeholder = t.search;
  document.getElementById("backBtn").textContent = t.backBtn;
  document.getElementById("chkTitle").textContent = t.chkTitle;
  document.getElementById("chkSubtitle").textContent = t.chkSubtitle;
  document.getElementById("lblBoat").textContent = t.lblBoat;
  document.getElementById("lblMarina").textContent = t.lblMarina;
  document.getElementById("lblDelivery").textContent = t.lblDelivery;
  document.getElementById("lblPax").textContent = t.lblPax;
  document.getElementById("lblNotes").textContent = t.lblNotes;
  document.getElementById("boatName").placeholder = t.phBoat;
  document.getElementById("marina").placeholder = t.phMarina;
  document.getElementById("delivery").placeholder = t.phDelivery;
  document.getElementById("pax").placeholder = t.phPax;
  document.getElementById("notes").placeholder = t.phNotes;
  document.getElementById("waBtnText").textContent = t.waBtnText;
  document.getElementById("fabText").textContent = t.myOrder;
  document.getElementById("drawerTitle").textContent = t.myOrder;
  renderDrawer();
}

function buildNav() {
  const t = T[lang];
  const navBar = document.getElementById("navBar");
  // Remove old nav buttons (keep lang switch)
  const lswitch = navBar.querySelector(".lang-switch");
  navBar.innerHTML = "";
  NAV_KEYS.forEach((key,i) => {
    const btn = document.createElement("button");
    btn.className = "nbtn" + (i===activeNav?" on":"");
    btn.textContent = t[key];
    btn.onclick = () => {
      activeNav = i;
      document.querySelectorAll(".nbtn").forEach(b=>b.classList.remove("on"));
      btn.classList.add("on");
      renderSections();
    };
    navBar.appendChild(btn);
  });
  navBar.appendChild(lswitch);
}

function renderSections() {
  const t = T[lang];
  const q = document.getElementById("searchInput").value.toLowerCase();
  const main = document.getElementById("sectionsMain");
  main.innerHTML = "";
  const navIds = NAV_IDS[activeNav];

  const visible = CATALOG.filter(s => {
    if (navIds && !navIds.includes(s.id)) return false;
    if (!q) return true;
    return s.category.toLowerCase().includes(q) || s.items.some(it=>it.name.toLowerCase().includes(q));
  });

  if (visible.length === 0) {
    main.innerHTML = '<p style="font-style:italic;color:#8A9088;padding:40px 0;text-align:center;">—</p>';
    return;
  }

  visible.forEach(sec => {
    const isJewel = !!sec.isjewel;
    const div = document.createElement("div");
    div.className = "card";
    let html = `<div class="snum">N° ${sec.id}</div><div class="stitle">${sec.category}</div>`;
    if (isJewel) html += `<div style="background:rgba(60,15,18,.05);border-left:3px solid #3C0F12;padding:11px 15px;font-style:italic;font-size:13px;color:#3C0F12;margin-bottom:14px;">${t.jewNote}</div>`;

    sec.items.forEach(item => {
      const key = sec.id+"||"+item.name;
      const qty = cart[key]||0;
      const priceStr = item.price !== null ? fmt(item.price) : t.consultLabel;
      const ctrl = qty===0
        ? `<button class="abtn" onclick="addItem('${sec.id}','${item.name.replace(/'/g,"\'").replace(/"/g,'\"')}')">${t.addBtn}</button>`
        : `<div class="qctrl">
             <button class="qbtn" onclick="setQty('${key.replace(/'/g,"\'")}', ${qty-1})">−</button>
             <span class="qval">${qty}</span>
             <button class="qbtn" onclick="setQty('${key.replace(/'/g,"\'")}', ${qty+1})">+</button>
           </div>`;
      html += `<div class="irow"><span class="iname">${item.name}</span><span class="iprice">${priceStr}</span>${ctrl}</div>`;
    });

    div.innerHTML = html;
    main.appendChild(div);
  });
}

function addItem(secId, name) {
  const key = secId+"||"+name;
  cart[key] = (cart[key]||0)+1;
  updateCart();
  renderSections();
}

function setQty(key, qty) {
  if (qty<=0) delete cart[key];
  else cart[key]=qty;
  updateCart();
  renderSections();
  renderDrawer();
}

function updateCart() {
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  const fab = document.getElementById("cartFab");
  document.getElementById("cartBadge").textContent = count;
  fab.style.display = count>0 ? "flex" : "none";
  renderDrawer();
}

function getItem(key) {
  const [secId, name] = key.split("||");
  const sec = CATALOG.find(s=>s.id===secId);
  return sec ? sec.items.find(i=>i.name===name) : null;
}

function cartTotal() {
  return Object.entries(cart).reduce((acc,[key,qty])=>{
    const it=getItem(key); return acc+(it?.price?it.price*qty:0);
  },0);
}

function renderDrawer() {
  const t = T[lang];
  const body = document.getElementById("drawerBody");
  const foot = document.getElementById("drawerFoot");
  const entries = Object.entries(cart).filter(([,q])=>q>0);

  if (entries.length===0) {
    body.innerHTML=`<p style="font-style:italic;color:#8A9088;text-align:center;margin-top:40px;">${t.emptyCart}</p>`;
    foot.innerHTML="";
    return;
  }

  body.innerHTML = entries.map(([key,qty])=>{
    const it=getItem(key);
    return `<div class="ci">
      <div style="flex:1"><div class="ci-name">${it?.name||key.split("||")[1]}</div>
      <div class="ci-price">${it?.price?fmt(it.price*qty):t.consultLabel}</div></div>
      <div class="qctrl">
        <button class="qbtn" onclick="setQty('${key.replace(/'/g,"\'")}', ${qty-1})">−</button>
        <span class="qval">${qty}</span>
        <button class="qbtn" onclick="setQty('${key.replace(/'/g,"\'")}', ${qty+1})">+</button>
      </div></div>`;
  }).join("");

  foot.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
      <span style="font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8A9088;">${t.totalLbl}</span>
      <span style="font-family:'Raleway',sans-serif;font-size:18px;font-weight:700;color:#3C0F12;">${fmt(cartTotal())}</span>
    </div>
    <button onclick="goCheckout()" style="background:#3C0F12;color:#fff;border:none;width:100%;padding:13px;font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;cursor:pointer;">${t.checkoutBtn}</button>
    <button onclick="clearCart()" style="background:none;border:none;width:100%;padding:9px;font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8A9088;cursor:pointer;margin-top:4px;">${t.clearCart}</button>`;
}

function clearCart() { cart={}; updateCart(); closeDrawer(); }
function openDrawer() { document.getElementById("drawer").classList.add("open"); document.getElementById("overlay").classList.add("on"); }
function closeDrawer() { document.getElementById("drawer").classList.remove("open"); document.getElementById("overlay").classList.remove("on"); }

function goCheckout() {
  closeDrawer();
  document.getElementById("catalogWrap").classList.add("off");
  document.getElementById("checkoutWrap").classList.add("on");
  document.getElementById("cartFab").style.display="none";
  renderSummary();
  window.scrollTo({top:0,behavior:"smooth"});
}

function showCatalog() {
  document.getElementById("catalogWrap").classList.remove("off");
  document.getElementById("checkoutWrap").classList.remove("on");
  updateCart();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderSummary() {
  const t = T[lang];
  const entries = Object.entries(cart).filter(([,q])=>q>0);
  const div = document.getElementById("orderSummary");
  let html = `<p style="font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A9088;margin-bottom:10px;">${t.summaryLbl}</p>`;
  entries.forEach(([key,qty])=>{
    const it=getItem(key);
    html+=`<div class="sum-row"><span>${qty}× ${it?.name||key.split("||")[1]}</span><span style="font-family:'Raleway',sans-serif;font-size:12px;color:#3C0F12;font-weight:500;">${it?.price?fmt(it.price*qty):t.consultLabel}</span></div>`;
  });
  html+=`<div class="sum-total"><span style="font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;">${t.totalLbl}</span><span style="font-family:'Raleway',sans-serif;font-size:16px;font-weight:700;color:#3C0F12;">${fmt(cartTotal())}</span></div>`;
  div.innerHTML=html;
}

function sendWhatsApp() {
  const t = T[lang];
  const boat = document.getElementById("boatName").value.trim();
  const marina = document.getElementById("marina").value.trim();
  const delivery = document.getElementById("delivery").value.trim();
  const pax = document.getElementById("pax").value.trim();
  const notes = document.getElementById("notes").value.trim();

  if (!boat) { alert(t.alertBoat); return; }
  if (!marina) { alert(t.alertMarina); return; }
  if (!delivery) { alert(t.alertDelivery); return; }

  const entries = Object.entries(cart).filter(([,q])=>q>0);
  const lines = entries.map(([key,qty])=>{
    const it=getItem(key);
    return `• ${qty}× ${it?.name||key.split("||")[1]}  (${it?.price?fmt(it.price*qty):t.consultLabel})`;
  }).join("\n");

  const msg = [
    t.waHeader,"",
    `${t.waBoat} ${boat}`,
    `${t.waMarina} ${marina}`,
    `${t.waDelivery} ${delivery}`,
    pax?`${t.waPax} ${pax}`:null,"",
    t.waProducts, lines,"",
    `${t.waTotal} ${fmt(cartTotal())}`,
    notes?`\n${t.waNotes} ${notes}`:null,"",
    t.waTagline
  ].filter(x=>x!==null).join("\n");

  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,"_blank");
}
</script>
